<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-container">
    <h1>用户注册</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="error-msg">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}

    <form method="post">
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" placeholder="请输入用户名" required>

        <label for="password">密码</label>
        <input id="password" name="password" type="password" placeholder="请输入密码" required>

        <label for="confirm_password">确认密码</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="请再次输入密码" required>

        <button type="submit">注册</button>
    </form>

    <p class="action-link">已有账号？<a href="{{ url_for('login') }}">返回登录</a></p>
</div>
</body>
</html>
